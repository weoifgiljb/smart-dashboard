name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Set base path
        id: set-base-path
        run: |
          if [[ "${{ github.event.repository.name }}" == *".github.io" ]]; then
            echo "base_path=/" >> $GITHUB_OUTPUT
          else
            echo "base_path=/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT
          fi

      - name: Build
        working-directory: ./frontend
        env:
          # GitHub Pages base 路径（自动检测）
          # 如果仓库名以 .github.io 结尾，则 base 为 '/'
          # 否则为 '/仓库名/'
          VITE_BASE_PATH: ${{ steps.set-base-path.outputs.base_path }}
          # 生产环境的 API 地址
          # 如果后端部署在其他地方，请在仓库 Secrets 中设置 VITE_API_BASE
          VITE_API_BASE: ${{ secrets.VITE_API_BASE || '/api' }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

